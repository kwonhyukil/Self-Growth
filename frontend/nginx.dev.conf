# ─────────────────────────────────────────────────────────────────────────────
# Self Growth Log — Development Nginx reverse proxy
#
# Single HTTP entry point for the dev stack:
#   /api/*  → backend Express server  (backend:4000)
#   /*      → Vite dev server         (frontend:5174)
#              includes WebSocket HMR upgrade
# ─────────────────────────────────────────────────────────────────────────────

# Conditionally set the Connection header:
#   - When the client sends an Upgrade (WebSocket) request → "upgrade"
#   - On regular HTTP requests (empty Upgrade header)      → "close"
# Setting Connection: upgrade unconditionally on plain HTTP breaks keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen      80;
    server_name _;

    # ── API proxy → Express backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── All other traffic → Vite dev server (HMR WebSocket included) ─────────
    location / {
        proxy_pass         http://frontend:5174;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for Vite HMR
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Disable response buffering so Vite's SSE fallback frames are
        # forwarded immediately instead of being held until the buffer fills.
        proxy_buffering    off;

        # Keep HMR WebSocket connections alive.
        # Default 60s would silently drop idle HMR sockets and break hot-reload.
        proxy_read_timeout 3600s;
    }
}
