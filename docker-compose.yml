services:
  mysql:
    image: mysql:8.0
    container_name: self-growth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: self_growth_log
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  api:
    build: .
    container_name: self-growth-api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:rootpassword@mysql:3306/self_growth_log?charset=utf8mb4
      PORT: 3000
      JWT_SECRET: dev_secret_change_later
      JWT_EXPIRES_IN: 3600
    depends_on:
      - mysql
    ports:
      - "4000:3000"
    command: sh -c "npx prisma migrate deploy && npm run dev"

volumes:
  mysql_data:
